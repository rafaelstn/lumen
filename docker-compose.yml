services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: fiscal_db
      POSTGRES_USER: fiscal_user
      POSTGRES_PASSWORD: fiscal_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscal_user -d fiscal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://fiscal_user:fiscal_pass@postgres:5432/fiscal_db
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
